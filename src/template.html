<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet" />

  <body>
    <form action="">
      <div class="harbor">
        <h1>Select where the front of your ship should go:</h1>
        <div class="ship-container">
          <img src="./assets/carrier.svg" alt="carrier" class="carrier" />
          <label for="carrierX">X:</label>
          <input type="number" min="1" max="10" minlength="1" maxlength="2" id="carrierX" required />
          <label for="carrierY">Y:</label>
          <input type="text" pattern="^([a-j]|[A-J])$" minlength="1" maxlength="1" id="carrierY" required />
          <button type="button" class="orient" id="carrier-orient">Vert</button>
        </div>
        <div class="ship-container">
          <img src="./assets/battle.svg" alt="Battleship" class="battle" />
          <label for="battleX">X:</label>
          <input type="number" min="1" max="10" minlength="1" maxlength="2" id="battleX" required />
          <label for="battleY">Y:</label>
          <input type="text" pattern="^([a-j]|[A-J])$" minlength="1" maxlength="1" id="battleY" required />
          <button type="button" class="orient" id="battle-orient">Vert</button>
        </div>
        <div class="ship-container">
          <img src="./assets/destroy.svg" alt="destroyer" class="destroyer" />
          <label for="destroyX">X:</label>
          <input type="number" min="1" max="10" minlength="1" maxlength="2" id="destroyX" required />
          <label for="destroyY">Y:</label>
          <input type="text" pattern="^([a-j]|[A-J])$" minlength="1" maxlength="1" id="destroyY" required />
          <button type="button" class="orient" id="destroy-orient">Vert</button>
        </div>
        <div class="ship-container">
          <img src="./assets/sub.svg" alt="submarine" class="submarine" />
          <label for="subX">X:</label>
          <input type="number" min="1" max="10" minlength="1" maxlength="2" id="subX" required />
          <label for="subY">Y:</label>
          <input type="text" pattern="^([a-j]|[A-J])$" minlength="1" maxlength="1" id="subY" required />
          <button type="button" class="orient" id="sub-orient">Vert</button>
        </div>
        <div class="ship-container">
          <img src="./assets/patrol.svg" alt="patrol boat" class="patrol" />
          <label for="patrolX">X:</label>
          <input type="number" min="1" max="10" minlength="1" maxlength="2" id="patrolX" required />
          <label for="patrolY">Y:</label>
          <input type="text" pattern="^([a-j]|[A-J])$" minlength="1" maxlength="1" id="patrolY" required />
          <button type="button" class="orient" id="patrol-orient">Vert</button>
        </div>
        <button type="button" class="go">Go</button>
      </div>
    </form>
